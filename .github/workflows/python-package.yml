name: Python Package

on: [push]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5

    steps:
    - uses: actions/checkout@v4
    - name: Set up Conda
      uses: conda-incubator/setup-miniconda@v2
      with:
        auto-activate-base: false
        activate-environment: libenv
        python-version: '3.10'
        miniconda-version: latest
    - name: Remove existing environment (if any)
      run: conda env remove --name libenv || true
    - name: Install dependencies
      run: conda env update --file environment.yml --name libenv
    - name: Install flake8 directly
      run: conda install -n libenv flake8
    - name: Install coverage for testing
      run: conda install -n libenv -c conda-forge coverage

    - name: Lint with flake8
      run: conda run -n libenv flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Test with pytest and generate coverage
      run: |
        conda run -n libenv python _run_test.py
      shell: /usr/bin/bash -e {0}

    - name: Coveralls GitHub Action
      uses: coverallsapp/github-action@v2.3.4
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path-to-lcov: ./coverage.xml  # 确保路径与脚本中生成的 XML 文件路径一致
      env:
        COVERALLS_PARALLEL: true
        COVERALLS_FLAG_NAME: myflag
        COVERALLS_SERVICE_NAME: github
        COVERALLS_SERVICE_JOB_ID: ${{ github.run_id }}
        COVERALLS_SERVICE_PULL_REQUEST: ${{ github.event.pull_request.number }}


    - name: Build the package
      run: |
        conda run -n libenv python -m build
        ls dist
    - name: Install the package
      run: pip install dist/*
    - name: Check the installed package
      run: |
        # Add commands to check the installed package if necessary
    - name: Check distribution
      run: twine check dist/*
    - name: Publish to PyPI
      if: startsWith(github.ref, 'refs/tags')
      run: |
        conda run -n libenv twine upload dist/*
      env:
        TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
        TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}