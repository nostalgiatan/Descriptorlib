name: Python Package

on: [push]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5

    steps:
    - uses: actions/checkout@v4
    - name: Set up Conda
      uses: conda-incubator/setup-miniconda@v2
      with:
        auto-activate-base: false
        activate-environment: libenv
        python-version: '3.10'
        miniconda-version: latest
    - name: Remove existing environment (if any)
      run: conda env remove --name libenv || true
    - name: Install dependencies
      run: conda env update --file environment.yml --name libenv
    - name: Install flake8 directly
      run: conda install -n libenv flake8
    - name: Install coverage for testing
      run: conda install -n libenv -c conda-forge coverage

    - name: Lint with flake8
      run: conda run -n libenv flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    - name: Test with pytest
      run: |
        cd $GITHUB_WORKSPACE
        conda run -n libenv coverage run --source=Descriptorlib ./Descriptorlib/run_tests_with_coverage.py
        
    - name: Coverage
      run: conda run -n libenv coverage xml

    - name: Coveralls GitHub Action
      uses: coverallsapp/github-action@v2.3.4
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
      env:
        COVERALLS_PARALLEL: true

    - name: Build the package
      run: |
        conda run -n libenv python setup.py sdist bdist_wheel
        ls dist  # Optional: to check the contents of the dist directory
    - name: Install the package
      run: pip install dist/*
    - name: Check the installed package
      run: |
        # Add commands to check the installed package if necessary
    - name: Check distribution
      run: twine check dist/*
    - name: Publish to PyPI
      if: startsWith(github.ref, 'refs/tags')
      run: |
        pip install twine
        twine upload dist/*
      env:
        TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
        TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}